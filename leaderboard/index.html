<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAILabs Quiz — Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#060610;--surface:#0d0d1f;--border:#1a1a30;--accent:#7c3aed;--accent2:#06b6d4;
    --gold:#f59e0b;--silver:#9ca3af;--bronze:#cd7c2f;--green:#10b981;--red:#ef4444;
    --text:#f0f0ff;--muted:#4a4a68;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;overflow:hidden;display:grid;grid-template-rows:auto 1fr auto;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(124,58,237,0.08) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 50%,rgba(6,182,212,0.06) 0%,transparent 60%);pointer-events:none;z-index:0;}
  header{position:relative;z-index:10;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(6,6,16,0.9);backdrop-filter:blur(10px);}
  .school-banner{font-size:20px;font-weight:800;}
  .school-sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px;}
  .header-center{text-align:center;flex:1;}
  .header-logo{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;}
  .header-quiz-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--accent2) 60%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header-right{text-align:right;}
  .participant-count{font-size:34px;font-weight:900;font-family:'Space Mono',monospace;color:var(--accent);line-height:1;}
  .participant-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .main{position:relative;z-index:10;display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:16px 40px;overflow:hidden;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .lb-section{display:flex;flex-direction:column;overflow:hidden;}
  .lb-table{width:100%;border-collapse:separate;border-spacing:0 5px;}
  .lb-table thead th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:6px 10px;text-align:left;font-family:'Space Mono',monospace;}
  .lb-row td{padding:10px;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);transition:all 0.4s ease;}
  .lb-row td:first-child{border-left:1px solid var(--border);border-radius:10px 0 0 10px;}
  .lb-row td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0;}
  .lb-row.rank-1 td{border-color:var(--gold);background:rgba(245,158,11,0.07);}
  .lb-row.rank-2 td{border-color:var(--silver);background:rgba(156,163,175,0.04);}
  .lb-row.rank-3 td{border-color:var(--bronze);background:rgba(205,124,47,0.05);}
  .rank-cell{font-size:20px;text-align:center;width:40px;}
  .rank-num{font-size:14px;font-weight:800;font-family:'Space Mono',monospace;color:var(--muted);text-align:center;}
  .name-cell .p-name{font-size:14px;font-weight:700;}
  .name-cell .p-name.g{color:var(--gold);}
  .name-cell .p-name.s{color:var(--silver);}
  .name-cell .p-name.b{color:var(--bronze);}
  .name-cell .p-school{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:1px;}
  .correct-cell{text-align:center;}
  .correct-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);border-radius:6px;padding:3px 8px;font-size:13px;font-weight:800;color:var(--green);font-family:'Space Mono',monospace;}
  .wrong-cell{text-align:center;}
  .wrong-badge{display:inline-flex;align-items:center;gap:3px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:3px 8px;font-size:13px;font-weight:800;color:var(--red);font-family:'Space Mono',monospace;}
  .time-cell{text-align:center;font-size:12px;color:var(--accent2);font-family:'Space Mono',monospace;}
  .score-cell{text-align:center;font-size:20px;font-weight:900;font-family:'Space Mono',monospace;color:var(--gold);}
  .lb-row.rank-2 .score-cell{color:var(--silver);}
  .lb-row.rank-3 .score-cell{color:var(--bronze);}
  .right-side{display:flex;flex-direction:column;gap:14px;}
  .q-display-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .q-status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .q-num-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));padding:3px 12px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff;}
  .q-text-display{font-size:16px;font-weight:700;line-height:1.5;margin-bottom:12px;}
  .options-2col{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .opt-pill{padding:7px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;display:flex;gap:6px;align-items:center;transition:all 0.4s ease;}
  .opt-pill.correct{border-color:var(--green);background:rgba(16,185,129,0.12);color:var(--green);font-weight:700;}
  .opt-letter-sm{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
  .timer-section{display:flex;align-items:center;justify-content:center;gap:20px;padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;}
  .timer-display{font-size:60px;font-weight:900;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;min-width:80px;text-align:center;}
  .timer-display.danger{background:linear-gradient(135deg,#ef4444,#f97316);-webkit-background-clip:text;background-clip:text;animation:timerPulse 0.4s ease infinite;}
  @keyframes timerPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.05)}}
  .timer-ring-wrap{position:relative;width:76px;height:76px;}
  .timer-ring-wrap svg{transform:rotate(-90deg);}
  .tr-bg{fill:none;stroke:var(--border);stroke-width:6;}
  .tr-fill{fill:none;stroke:var(--accent2);stroke-width:6;stroke-linecap:round;stroke-dasharray:220;transition:stroke-dashoffset 0.9s linear,stroke 0.5s;}
  .tr-fill.danger{stroke:var(--red);}
  .answered-pill{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .answered-num{font-size:26px;font-weight:800;font-family:'Space Mono',monospace;color:var(--accent);}
  .answered-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;flex:1;}
  .chart-inner{display:flex;gap:6px;align-items:flex-end;height:90px;padding-top:10px;}
  .chart-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
  .chart-val{font-size:9px;font-family:'Space Mono',monospace;color:var(--muted);}
  .chart-bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);min-height:4px;}
  .chart-name{font-size:9px;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-family:'Space Mono',monospace;}
  .lobby-display{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .lobby-count-big{font-size:110px;font-weight:900;font-family:'Space Mono',monospace;background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;animation:countPulse 2s ease infinite;}
  @keyframes countPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
  .lobby-label{font-size:18px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-family:'Space Mono',monospace;}
  .scan-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 36px;text-align:center;}
  .scan-label{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-family:'Space Mono',monospace;}
  .scan-url{font-size:18px;font-weight:700;color:var(--accent2);}
  .participant-scroll{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:900px;}
  .p-chip{padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:600;animation:chipIn 0.3s ease;}
  @keyframes chipIn{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:none}}
  .winner-overlay{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;animation:winnerIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;}
  @keyframes winnerIn{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:none}}
  .winner-trophy{font-size:72px;animation:trophyBounce 1.2s ease infinite;}
  @keyframes trophyBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}
  .winner-label{font-size:14px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;font-family:'Space Mono',monospace;}
  .winner-name{font-size:52px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold),#fbbf24,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .winner-stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .winner-stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;text-align:center;}
  .wstat-val{font-size:28px;font-weight:900;font-family:'Space Mono',monospace;}
  .wstat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
  .podium-row{display:flex;gap:14px;align-items:flex-end;margin-top:8px;}
  .podium-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;min-width:140px;}
  .podium-medal{font-size:28px;}
  .podium-name{font-size:14px;font-weight:700;margin:4px 0;}
  .podium-name.g{color:var(--gold);}.podium-name.s{color:var(--silver);}.podium-name.b{color:var(--bronze);}
  .podium-score{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;}
  .podium-score.g{color:var(--gold);}.podium-score.s{color:var(--silver);}.podium-score.b{color:var(--bronze);}
  .podium-detail{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px;}
  footer{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:8px 40px;border-top:1px solid var(--border);background:rgba(6,6,16,0.9);backdrop-filter:blur(10px);}
  .footer-phase{font-size:12px;font-family:'Space Mono',monospace;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:statusPulse 2s ease infinite;}
  @keyframes statusPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
  .footer-url{font-family:'Space Mono',monospace;font-size:12px;color:var(--accent2);}
</style>
</head>
<body>
<header>
  <div>
    <div class="school-banner" id="school-name">EduAILabs Quiz</div>
    <div class="school-sub">eduailabs.com</div>
  </div>
  <div class="header-center">
    <div class="header-logo">EduAILabs.com</div>
    <div class="header-quiz-title" id="quiz-title">AI Workshop Quiz</div>
  </div>
  <div class="header-right">
    <div class="participant-count" id="participant-count">0</div>
    <div class="participant-label">Participants</div>
  </div>
</header>

<div class="main" id="main-content">
  <div class="lobby-display" id="lobby-view">
    <div class="lobby-count-big" id="lobby-big-count">0</div>
    <div class="lobby-label">Participants Ready</div>
    <div class="scan-box">
      <div class="scan-label">📱 Scan QR or Visit</div>
      <div class="scan-url" id="scan-url">loading...</div>
    </div>
    <div class="participant-scroll" id="participant-chips"></div>
  </div>
</div>

<footer>
  <div class="footer-phase">
    <div class="status-dot"></div>
    <span id="footer-phase">Waiting for Quiz Master...</span>
  </div>
  <div class="footer-url">eduailabs.com</div>
</footer>

<script>
const WS_URL = 'ws://' + (location.hostname || 'localhost') + ':8080';
let ws = null, participants = [], leaderboard = [], currentQuestion = null;
let quizConfig = { totalQuestions:10, secondsPerQuestion:10, schoolName:'EduAILabs', quizTitle:'AI Workshop Quiz' };

function connect() {
  try { ws = new WebSocket(WS_URL); } catch(e) { setTimeout(connect, 3000); return; }
  ws.onopen = () => send({ type: 'LEADERBOARD_CONNECT' });
  ws.onclose = () => setTimeout(connect, 3000);
  ws.onerror = () => {};
  ws.onmessage = (e) => { try { handleMsg(JSON.parse(e.data)); } catch(err) {} };
}
function send(d) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(d)); }

function handleMsg(msg) {
  switch(msg.type) {
    case 'LEADERBOARD_CONNECTED':
      participants = msg.participants || []; quizConfig = msg.quizConfig || quizConfig;
      updateHeader(); updateLobbyView(); break;
    case 'PARTICIPANT_JOINED':
      participants = msg.participants || [];
      document.getElementById('participant-count').textContent = msg.count;
      document.getElementById('lobby-big-count').textContent = msg.count;
      updateParticipantChips(); break;
    case 'CONFIG_UPDATED': quizConfig = msg.quizConfig; updateHeader(); break;
    case 'QUESTION_START': currentQuestion = msg.question; showQuestionView(msg); break;
    case 'TIMER_TICK': updateTimer(msg.remaining, msg.total); break;
    case 'ANSWER_COUNT_UPDATE': updateAnsweredCount(msg.answered, msg.total); break;
    case 'ANSWER_REVEAL': leaderboard = msg.leaderboard; showReveal(msg); break;
    case 'QUIZ_FINISHED': leaderboard = msg.leaderboard; showWinner(msg.leaderboard); break;
    case 'QUIZ_RESET': location.reload(); break;
  }
}

function updateHeader() {
  document.getElementById('school-name').textContent = quizConfig.schoolName || 'EduAILabs';
  document.getElementById('quiz-title').textContent = quizConfig.quizTitle || 'AI Workshop Quiz';
}
function updateParticipantChips() {
  document.getElementById('participant-chips').innerHTML = participants.map(p => `<div class="p-chip">${esc(p.name)}</div>`).join('');
}
function updateLobbyView() {
  document.getElementById('lobby-big-count').textContent = participants.length;
  document.getElementById('participant-count').textContent = participants.length;
  document.getElementById('scan-url').textContent = location.protocol + '//' + location.hostname + ':8080/participant/';
  updateParticipantChips();
}

function showQuestionView(msg) {
  document.getElementById('footer-phase').textContent = `Question ${msg.questionIndex + 1} of ${msg.total} — LIVE`;
  const q = msg.question;
  const labels = ['A','B','C','D'];
  document.getElementById('main-content').innerHTML = `
    <div class="lb-section">
      <div class="section-title">🏆 Live Leaderboard</div>
      <table class="lb-table">
        <thead><tr>
          <th>#</th><th>Participant</th>
          <th style="text-align:center;">✅ Correct</th>
          <th style="text-align:center;">❌ Wrong</th>
          <th style="text-align:center;">⏱ Avg Time</th>
          <th style="text-align:center;">Score</th>
        </tr></thead>
        <tbody id="lb-tbody">${renderLBRows(leaderboard)}</tbody>
      </table>
    </div>
    <div class="right-side">
      <div class="timer-section">
        <div class="timer-ring-wrap">
          <svg viewBox="0 0 76 76" width="76" height="76">
            <circle class="tr-bg" cx="38" cy="38" r="33"/>
            <circle class="tr-fill" id="timer-ring" cx="38" cy="38" r="33"/>
          </svg>
        </div>
        <div class="timer-display" id="timer-num">${msg.duration}</div>
        <div class="answered-pill">
          <div class="answered-num" id="ans-count">0</div>
          <div class="answered-lbl">Answered</div>
          <div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;" id="ans-total">/ ${participants.length}</div>
        </div>
      </div>
      <div class="q-display-card">
        <div class="q-status-row"><div class="q-num-badge">QUESTION ${msg.questionIndex + 1} / ${msg.total}</div></div>
        <div class="q-text-display">${esc(q.question)}</div>
        <div class="options-2col" id="options-area">
          ${q.options.map((opt,i) => `<div class="opt-pill" id="opt-${i}"><span class="opt-letter-sm">${labels[i]}</span>${esc(opt)}</div>`).join('')}
        </div>
      </div>
      <div class="chart-card">
        <div class="section-title" style="margin-bottom:6px;">⏱ Response Time</div>
        <div class="chart-inner" id="time-chart"><div style="color:var(--muted);font-size:12px;padding:16px;width:100%;text-align:center;">Waiting for answers...</div></div>
      </div>
    </div>`;
  updateTimer(msg.duration, msg.duration);
}

function renderLBRows(lb) {
  if (!lb || !lb.length) return `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">Leaderboard appears after first question</td></tr>`;
  const medals = ['🥇','🥈','🥉'];
  const cls = ['g','s','b'];
  return lb.slice(0, 8).map((p, i) => {
    const correct = p.answers.filter(a => a && a.correct).length;
    const wrong = p.answers.filter(a => a && !a.correct && a.option !== -1).length;
    const noAns = p.answers.filter(a => a && a.option === -1).length;
    const avgMs = Math.round(p.avgTimeTaken);
    const avgStr = avgMs < 1000 ? avgMs + 'ms' : (avgMs/1000).toFixed(1) + 's';
    const rankClass = i < 3 ? `rank-${i+1}` : '';
    const c = cls[i] || '';
    return `<tr class="lb-row ${rankClass}">
      <td class="rank-cell">${i < 3 ? medals[i] : `<span class="rank-num">${i+1}</span>`}</td>
      <td class="name-cell"><div class="p-name ${c}">${esc(p.name)}</div><div class="p-school">${esc(p.school||'')}</div></td>
      <td class="correct-cell"><span class="correct-badge">✅ ${correct}</span></td>
      <td class="wrong-cell"><span class="wrong-badge">❌ ${wrong + noAns}</span></td>
      <td class="time-cell">${avgStr}</td>
      <td class="score-cell">${p.score}</td>
    </tr>`;
  }).join('');
}

function updateTimer(remaining, total) {
  const ringEl = document.getElementById('timer-ring');
  const numEl = document.getElementById('timer-num');
  if (!ringEl || !numEl) return;
  ringEl.style.strokeDashoffset = 220 * (1 - remaining / total);
  numEl.textContent = remaining;
  const danger = remaining <= 3 && remaining > 0;
  ringEl.classList.toggle('danger', danger);
  numEl.classList.toggle('danger', danger);
}
function updateAnsweredCount(answered, total) {
  const el = document.getElementById('ans-count'); const el2 = document.getElementById('ans-total');
  if (el) el.textContent = answered; if (el2) el2.textContent = '/ ' + total;
}

function showReveal(msg) {
  document.getElementById('footer-phase').textContent = '✓ Answer Revealed — Leaderboard Updated';
  const tbody = document.getElementById('lb-tbody');
  if (tbody) tbody.innerHTML = renderLBRows(msg.leaderboard);
  for (let i = 0; i < 4; i++) { const opt = document.getElementById('opt-' + i); if (opt && i === msg.correctOption) opt.classList.add('correct'); }
  const timerEl = document.getElementById('timer-num');
  if (timerEl) { timerEl.textContent = '✓'; timerEl.className = 'timer-display'; }
  renderTimeChart(msg.timings);
}

function renderTimeChart(timings) {
  const chartEl = document.getElementById('time-chart'); if (!chartEl || !timings) return;
  const entries = Object.values(timings).filter(t => t.timeTaken < 99999).sort((a,b) => a.timeTaken - b.timeTaken).slice(0, 20);
  if (!entries.length) return;
  const maxTime = Math.max(...entries.map(e => e.timeTaken));
  chartEl.innerHTML = entries.map(entry => {
    const pct = Math.round((entry.timeTaken / maxTime) * 90) + 4;
    const color = entry.correct ? '#10b981' : '#ef4444';
    const timeStr = entry.timeTaken < 1000 ? entry.timeTaken + 'ms' : (entry.timeTaken/1000).toFixed(1) + 's';
    return `<div class="chart-bar-wrap"><div class="chart-val">${timeStr}</div><div class="chart-bar" style="height:${pct}%;background:${color};opacity:0.85;"></div><div class="chart-name">${esc(entry.name.split(' ')[0])}</div></div>`;
  }).join('');
}

function showWinner(lb) {
  document.getElementById('footer-phase').textContent = '🏆 Quiz Complete! Final Results';
  if (!lb || !lb.length) return;
  const winner = lb[0];
  const top3 = lb.slice(0, 3);
  const medals = ['🥇','🥈','🥉'];
  const pcls = ['g','s','b'];

  // Safe answer counting — handles missing or empty answers array
  function countCorrect(p) {
    if (!p.answers || !p.answers.length) return 0;
    return p.answers.filter(a => a && a.correct === true).length;
  }
  function countWrong(p) {
    if (!p.answers || !p.answers.length) return 0;
    return p.answers.filter(a => a && a.correct === false && a.option !== -1).length;
  }
  function countNoAnswer(p) {
    if (!p.answers || !p.answers.length) return 0;
    return p.answers.filter(a => a && a.option === -1).length;
  }
  function avgTime(p) {
    const ms = Math.round(p.avgTimeTaken || 0);
    return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(1) + 's';
  }

  const winnerCorrect = countCorrect(winner);
  const winnerWrong = countWrong(winner) + countNoAnswer(winner);
  const winnerAvgStr = avgTime(winner);
  const totalQ = winner.answers ? winner.answers.length : 0;

  const tiedCount = lb.filter(p => p.score === winner.score).length;
  const tieMsg = tiedCount > 1
    ? `<div style="font-size:13px;color:var(--accent2);font-family:'Space Mono',monospace;margin-top:6px;">🏅 Won by fastest response time among ${tiedCount} tied participants!</div>`
    : '';

  document.getElementById('main-content').innerHTML = `
    <div class="winner-overlay">
      <div class="winner-trophy">🏆</div>
      <div class="winner-label">🎉 Quiz Champion</div>
      <div class="winner-name">${esc(winner.name || 'Unknown')}</div>
      <div style="font-size:14px;color:var(--muted);font-family:'Space Mono',monospace;">${esc(winner.school || '')}</div>
      ${tieMsg}
      <div class="winner-stats">
        <div class="winner-stat-box">
          <div class="wstat-val" style="color:var(--gold);">${winner.score}</div>
          <div class="wstat-lbl">Total Points</div>
        </div>
        <div class="winner-stat-box">
          <div class="wstat-val" style="color:var(--green);">✅ ${winnerCorrect}</div>
          <div class="wstat-lbl">Correct / ${totalQ}</div>
        </div>
        <div class="winner-stat-box">
          <div class="wstat-val" style="color:var(--red);">❌ ${winnerWrong}</div>
          <div class="wstat-lbl">Wrong / Skipped</div>
        </div>
        <div class="winner-stat-box">
          <div class="wstat-val" style="color:var(--accent2);">${winnerAvgStr}</div>
          <div class="wstat-lbl">Avg Speed</div>
        </div>
      </div>

      <div style="font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-top:8px;">🏅 Top 3 Podium</div>
      <div class="podium-row">
        ${top3.map((p, i) => {
          const c = countCorrect(p);
          const w = countWrong(p) + countNoAnswer(p);
          const t = p.answers ? p.answers.length : 0;
          const at = avgTime(p);
          return `
            <div class="podium-box" style="border-color:${i===0?'var(--gold)':i===1?'var(--silver)':'var(--bronze)'};">
              <div class="podium-medal">${medals[i]}</div>
              <div class="podium-name ${pcls[i]}">${esc(p.name)}</div>
              <div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:4px;">${esc(p.school||'')}</div>
              <div class="podium-score ${pcls[i]}">${p.score} pts</div>
              <div class="podium-detail">✅ ${c} correct · ❌ ${w} wrong</div>
              <div class="podium-detail">⏱ ${at} avg speed</div>
            </div>`;
        }).join('')}
      </div>

      <div style="margin-top:16px;width:100%;max-width:900px;">
        <div style="font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:8px;text-align:center;">📊 All Participants Final Results</div>
        <table class="lb-table" style="width:100%;">
          <thead><tr>
            <th>#</th><th>Participant</th>
            <th style="text-align:center;">✅ Correct</th>
            <th style="text-align:center;">❌ Wrong</th>
            <th style="text-align:center;">⏱ Avg Time</th>
            <th style="text-align:center;">Score</th>
          </tr></thead>
          <tbody>
            ${lb.map((p, i) => {
              const c = countCorrect(p);
              const w = countWrong(p) + countNoAnswer(p);
              const t = p.answers ? p.answers.length : 0;
              const at = avgTime(p);
              const rankClass = i < 3 ? `rank-${i+1}` : '';
              const cl = pcls[i] || '';
              return `<tr class="lb-row ${rankClass}">
                <td class="rank-cell">${i < 3 ? medals[i] : `<span class="rank-num">${i+1}</span>`}</td>
                <td class="name-cell">
                  <div class="p-name ${cl}">${esc(p.name)}</div>
                  <div class="p-school">${esc(p.school||'')}</div>
                </td>
                <td class="correct-cell"><span class="correct-badge">✅ ${c}</span></td>
                <td class="wrong-cell"><span class="wrong-badge">❌ ${w}</span></td>
                <td class="time-cell">${at}</td>
                <td class="score-cell">${p.score}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

connect();
// Fix scan URL — no port needed for Railway HTTPS
const scanHost = location.hostname === 'localhost' ? location.hostname + ':8080' : location.hostname;
const scanProto = location.protocol;
document.getElementById('scan-url').textContent = scanProto + '//' + scanHost + '/participant/';
</script>
</body>
</html>
